services:
  solar-dashboard:
    build: .
    container_name: solar-dashboard
    ports:
      - "3000:3000"
    volumes:
      # Persist JSON cache files (solar.json, week.json, recipients.json)
      # across container rebuilds. If ./data already has history it loads instantly.
      - ./data:/app/data
    restart: unless-stopped
    # The inverter at 192.168.231.240 is on the local LAN.
    # Docker Desktop for Windows routes traffic through the host automatically,
    # so no special network config is needed — the container reaches it directly.
